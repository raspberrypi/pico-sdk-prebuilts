name: Build UF2s

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      tools_version:
        description: 'Tools version'
        required: false
        type: string
      sdk_tag:
        description: 'Custom SDK tag'
        required: false
        type: string
      examples_tag:
        description: 'Custom Examples tag'
        required: false
        type: string
      sdk_repo:
        description: 'Custom SDK repo'
        required: false
        type: string
      examples_repo:
        description: 'Custom Examples repo'
        required: false
        type: string

permissions:
  contents: write

env:
  TOOLS_VERSION: ${{ inputs.tools_version != '' && inputs.tools_version || '2.2.0' }}
  SDK_TAG: ${{ inputs.sdk_tag != '' && inputs.sdk_tag || '2.2.0' }}
  EXAMPLES_TAG: ${{ inputs.examples_tag != '' && inputs.examples_tag || 'sdk-2.2.0' }}
  SDK_REPO: ${{ inputs.sdk_repo != '' && inputs.sdk_repo || 'raspberrypi/pico-sdk' }}
  EXAMPLES_REPO: ${{ inputs.examples_repo != '' && inputs.examples_repo || 'raspberrypi/pico-examples' }}

jobs:
  build-uf2s:
    name: Build UF2s
    runs-on: ubuntu-latest
    # Prevent running twice for PRs from same repo
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
      - name: Print environment
        run: |
          echo "TOOLS_VERSION=${{ env.TOOLS_VERSION }}"
          echo "SDK_TAG=${{ env.SDK_TAG }}"
          echo "EXAMPLES_TAG=${{ env.EXAMPLES_TAG }}"
          echo "SDK_REPO=${{ env.SDK_REPO }}"
          echo "EXAMPLES_REPO=${{ env.EXAMPLES_REPO }}"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt install cmake ninja-build python3 build-essential libusb-1.0-0-dev
      - name: Cache Toolchains
        id: cache-toolchains
        uses: actions/cache@v5
        with:
          path: |
            arm-toolchain
            riscv-toolchain
            picotool
            pico-sdk-tools
          key: ${{ runner.os }}-${{ runner.arch }}-${{ env.TOOLS_VERSION }}-toolchains
      - name: Install Toolchains & Tools
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: ./download_extract_tools.sh ${{ env.TOOLS_VERSION }}
      - name: Checkout Pico SDK
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SDK_REPO }}
          ref: ${{ env.SDK_TAG }}
          path: pico-sdk
          submodules: 'recursive'
      - name: Checkout Pico Examples
        uses: actions/checkout@v6
        with:
          repository: ${{ env.EXAMPLES_REPO }}
          ref: ${{ env.EXAMPLES_TAG }}
          path: pico-examples
      - name: Build Universal UF2s
        run: |
          cmake -S pico-examples -B build-universal -G "Ninja" -D PICO_SDK_PATH="${{ github.workspace }}/pico-sdk" -D PICO_TOOLCHAIN_PATH="${{ github.workspace }}/arm-toolchain" -D PICO_ARM_TOOLCHAIN_PATH="${{ github.workspace }}/arm-toolchain" -D PICO_RISCV_TOOLCHAIN_PATH="${{ github.workspace }}/riscv-toolchain" -D picotool_DIR="${{ github.workspace }}/picotool/picotool" -D pioasm_DIR="${{ github.workspace }}/pico-sdk-tools/pioasm"
          cmake --build build-universal --target hello_universal blink_universal nuke_universal
      - name: Upload UF2s
        uses: actions/upload-artifact@v6
        with:
          name: uf2s
          path: |
            build-universal/universal/blink_universal/blink_universal.uf2
            build-universal/universal/hello_universal/hello_universal.uf2
            build-universal/universal/nuke_universal/nuke_universal.uf2
      - name: Add Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build-universal/universal/blink_universal/blink_universal.uf2
            build-universal/universal/hello_universal/hello_universal.uf2
            build-universal/universal/nuke_universal/nuke_universal.uf2
